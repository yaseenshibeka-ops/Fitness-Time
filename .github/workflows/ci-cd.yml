name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: fittrack_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # In a real scenario, we would run tests here
    # - name: Run Tests
    #   run: npm test
    #   env:
    #     DB_HOST: 127.0.0.1
    #     DB_USER: root
    #     DB_PASSWORD: secret
    #     DB_NAME: fittrack_test
    #     JWT_SECRET: test_secret

    - name: Build Docker Image
      run: docker build -t fittrack-rwanda .

  # Placeholder for deployment job
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Render/Railway
      run: echo "Deployment step would execute here"
