services:
  app:
    build: .
    container_name: fittrack-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=secret
      - DB_NAME=fittrack
      - DB_PORT=5432
      - JWT_SECRET=dev_secret_key_123
      - JWT_EXPIRES_IN=24h
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./client/src:/app/client/src
      - ./client/index.html:/app/client/index.html
      - ./client/vite.config.js:/app/client/vite.config.js
      - ./client/package.json:/app/client/package.json
      - /app/node_modules
      - /app/client/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npm run migrate && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:15-alpine
    container_name: fittrack-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=fittrack
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fittrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
