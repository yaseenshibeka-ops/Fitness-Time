<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - FitTrack Rwanda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">FitTrack Rwanda</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/products.html">Shop</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cart.html">Cart <span id="cartCount" class="badge bg-primary">0</span></a>
                    </li>
                    <ul class="navbar-nav ms-auto" id="authLinks">
                        <!-- Populated by JS -->
                    </ul>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="container" style="padding-top: 100px;">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 class="fw-bold">Premium Fitness Gear</h1>
                <p class="text-muted">Equip yourself for greatness with our curated selection.</p>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <select id="categoryFilter" class="form-select bg-dark text-light border-secondary">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="col-md-8 mt-3 mt-md-0">
                <input type="text" id="searchInput" class="form-control bg-dark text-light border-secondary" placeholder="Search products...">
            </div>
        </div>

        <div class="row" id="productsGrid">
            <!-- Loading Spinner -->
            <div class="text-center my-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast for Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="cartToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Item added to cart!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
